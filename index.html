<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nutri Tracker Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>

<header>
<h1>Nutri Tracker Pro</h1>
</header>

<section>
<h2>Perfil</h2>
<input id="peso" placeholder="Peso (kg)">
<input id="altura" placeholder="Altura (cm)">
<input id="idade" placeholder="Idade">
<select id="sexo">
<option value="m">Masculino</option>
<option value="f">Feminino</option>
</select>
<button onclick="calcular()">Calcular Metabolismo</button>

<p id="tmb"></p>
<p id="metaCal"></p>
<p id="metaProt"></p>
<p id="metaAgua"></p>
</section>

<section>
<h2>Adicionar alimento</h2>
<select id="foodSelect"></select>
<input id="gramas" placeholder="Quantidade (g)">
<button onclick="addFood()">Adicionar</button>

<ul id="lista"></ul>

<p id="totalCal"></p>
<p id="totalProt"></p>
<p id="totalCarb"></p>
<p id="totalFat"></p>
</section>

<section>
<h2>Scanner de Código de Barras</h2>
<div id="scanner" style="width:100%;height:200px;background:#000"></div>
<button onclick="startScanner()">Iniciar Scanner</button>
</section>

<section>
<h2>Evolução de Peso</h2>
<canvas id="pesoChart"></canvas>
</section>

<section>
<h2>Checklist de Água</h2>
<div id="waterChecklist"></div>
</section>

<script src="foods.js"></script>
<script src="app.js"></script>
</body>
</html>
